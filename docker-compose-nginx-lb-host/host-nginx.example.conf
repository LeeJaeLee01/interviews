# Ví dụ gắn vào Nginx TRÊN HOST (TLS + domain)
# Đường dẫn thật: /etc/nginx/sites-available/... → sites-enabled
#
# Giả định: docker compose publish LB tại 127.0.0.1:3030 (nginx-lb)

# --- HTTP → HTTPS ---
server {
    listen 80;
    listen [::]:80;
    server_name api.example.com;

    return 301 https://api.example.com$request_uri;
}

# --- HTTPS → proxy xuống LB trong Docker (HTTP nội bộ) ---
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.example.com;

    ssl_certificate     /etc/letsencrypt/live/api.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.example.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location /api/ {
        proxy_pass http://127.0.0.1:3030/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
