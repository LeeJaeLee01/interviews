# Nginx trong Docker — load balancer tới service `app` (Compose DNS)
# Khi: docker compose up --scale app=3, tên `app` trỏ tới nhiều container.
# Nginx OSS resolve `app` một lần lúc start; muốn LB động chặt chẽ hơn → HAProxy/Traefik/K8s.

upstream backend {
    least_conn;
    server app:3030;
}

server {
    listen 80;
    server_name _;

    location / {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
